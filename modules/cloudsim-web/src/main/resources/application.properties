spring.application.name=cloudsim-web
server.port=8080

# SQLite via JPA
spring.datasource.url=jdbc:sqlite:${user.home}/.cloudsim/cloudsim.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT secret — override in production via env var APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:cloudsim-default-secret-change-in-production-32ch}

# Logging — silence CloudSim's verbose output in the API layer
logging.level.org.cloudbus.cloudsim=WARN
logging.level.org.hibernate.SQL=WARN
