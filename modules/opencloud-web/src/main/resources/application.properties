spring.application.name=opencloud-web
server.port=8080

# SQLite via JPA
spring.datasource.url=jdbc:sqlite:${user.home}/.opencloud/opencloud.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT secret — override in production via env var APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:opencloud-default-secret-change-in-production-32ch}

# Logging — suppress verbose simulation output in the API layer
logging.level.org.opencloud=WARN
logging.level.org.hibernate.SQL=WARN
